<!-- HEADER - Navigation principale -->
<div class="border-t-4 border-b-4 border-red-700 border-b-green-700">
  <div class="max-w-6xl mx-auto px-4 py-2">
    <nav class="flex items-center justify-between py-4">
      <!-- Logo & Brand -->
      <div class="flex items-center gap-3">
        <img src="images/logo.jpeg" alt="Logo Rugby Basque XIII" class="h-20 w-auto">
        <div>
          <div class="font-extrabold text-gray-800" data-i18n="header.logo.nom"></div>
          <div class="text-sm text-gray-500" data-i18n="header.logo.since"></div>
        </div>
      </div>

      <!-- Desktop Menu -->
      <ul class="hidden md:flex items-center gap-6 font-semibold text-gray-600">
        <li><a href="#about" class="hover:text-green-700" data-i18n="header.menu.club"></a></li>
        <li class="relative group">
          <button class="flex items-center gap-1 hover:text-green-700">
            <span data-i18n="header.menu.equipes"></span>
            <svg class="w-4 h-4 mt-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
            </svg>
          </button>
          <ul class="absolute left-0 mt-2 w-30 bg-white rounded-lg shadow-lg border opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50">
            <li>
              <button data-equipe="equipes/seniors.html" class="w-full text-left px-4 py-2 hover:bg-green-50 hover:text-green-700 rounded-lg bg-transparent border-0 font-normal" data-i18n="header.menu.senior"></button>
            </li>
          </ul>
        </li>
        <li><a href="https://basquexiii.fr/boutique/" target="_blank" class="hover:text-green-700" data-i18n="header.menu.boutique"></a></li>
        <li><a href="#calendrier" class="hover:text-green-700" data-i18n="header.menu.calendrier"></a></li>
        <li><a href="#contact" class="hover:text-green-700" data-i18n="header.menu.contact"></a></li>
      </ul>

      <!-- Language Menu -->
      <div class="hidden md:flex items-center gap-3 text-sm font-semibold">
        <a href="#" data-lang="fr" class="hover:text-green-700"><img src="images/fr_flag_icon.png" alt="Drapeau France" class="h-7 w-auto"></a>
        <span class="text-gray-400">|</span>
        <a href="#" data-lang="eu" class="hover:text-green-700"><img src="images/eh_flag_icon.png" alt="Drapeau Pays Basque" class="h-7 w-auto"></a>
        <span class="text-gray-400">|</span>
        <a href="#" data-lang="en" class="hover:text-green-700"><img src="images/uk_flag_icon.png" alt="Drapeau Royaume Uni" class="h-7 w-auto"></a>
      </div>

      <!-- Mobile Menu Button -->
      <button id="burger" class="md:hidden text-gray-700 focus:outline-none">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"/>
        </svg>
      </button>
    </nav>

    <!-- Mobile Menu -->
    <div id="mobileMenu" class="hidden flex-col gap-4 mt-3 bg-white rounded-lg shadow-md p-4 md:hidden">
      <div class="flex flex-col gap-2 font-semibold text-sm text-center">
        <a href="#about" class="hover:text-green-700" data-i18n="header.menu.club"></a>
        <div>
          <p class="text-gray-500 uppercase text-xs tracking-wide mb-1" data-i18n="header.menu.equipes"></p>
          <button data-equipe="equipes/seniors.html" class="hover:text-green-700 font-semibold" data-i18n="header.menu.senior"></button>
        </div>
        <a href="https://basquexiii.fr/boutique/" target="_blank" class="hover:text-green-700" data-i18n="header.menu.boutique"></a>
        <a href="#calendrier" class="hover:text-green-700" data-i18n="header.menu.calendrier"></a>
        <a href="#contact" class="hover:text-green-700" data-i18n="header.menu.contact"></a>
      </div>
      <hr class="my-2 border-gray-200">
      <div class="flex gap-4 font-semibold text-sm text-center">
        <a href="#" data-lang="fr" class="hover:text-green-700 mx-auto"><img src="images/fr_flag_icon.png" alt="Drapeau France" class="h-5 w-auto"></a>
        <a href="#" data-lang="eu" class="hover:text-green-700 mx-auto"><img src="images/eh_flag_icon.png" alt="Drapeau Pays Basque" class="h-5 w-auto"></a>
        <a href="#" data-lang="en" class="hover:text-green-700 mx-auto"><img src="images/uk_flag_icon.png" alt="Drapeau Royaume Uni" class="h-5 w-auto"></a>
      </div>
    </div>
  </div>
</div>
